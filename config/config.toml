[appearance]
theme = "textual-dark"
# theme = "full_documented_theme"
# theme = "tokyo-night"

[autocomplete]
enabled = true
command_auto_complete = true

# if you put commands section with out any commands then there will be no commands
# if you want to use custom commands and the original commands then you need to
# re define them
# [commands]
# r = "r"
# n = "n"
# rn = "rn"
# echo = "echo"
# togglec = "togglec"
# c = "c"
# con = "con"
# connect = "connect"
# dis = "dis"
# disconnect = "disconnect"
# s = "s"
# select = "select"
# clear = "clear"
# l = "l"
# th = "th"
# throttle = "th"
# flush = "flush"
# ren = "ren"
# "ren" = ["rn", "echo"] # ren is a built in command but this is how you can make a command call multiple

# you can provide a descriptions for any command builtin or custom
# you get autocomplete suggestions in the popup
# [command_descriptions]
# "ren" = "toggles both newlines and echo"

[keybindings]
"ctrl+l" = "clear"
"ctrl+s" = "select"
"ctrl+r" = "r"
"ctrl+n" = "n"
"ctrl+g" = "reload"

[devices.charachroder]
description = "(?i)charachorder"
baud_rate = 11520
